<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stem -->
  <rect x="94" y="148" width="12" height="112" rx="6" fill="#5a9a3a"/>
  <!-- Thorns -->
  <path d="M94 218 L80 210 L94 214 Z" fill="#4d8f2e"/>
  <path d="M106 240 L120 232 L106 236 Z" fill="#4d8f2e"/>
  <!-- Left leaf -->
  <path d="M94 178 Q56 162 50 140 Q72 149 94 166 Z" fill="#4d8f2e"/>
  <line x1="94" y1="178" x2="57" y2="153" stroke="#3d7a1e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right leaf -->
  <path d="M106 206 Q144 188 150 168 Q128 177 106 193 Z" fill="#4d8f2e"/>
  <line x1="106" y1="206" x2="143" y2="177" stroke="#3d7a1e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 3 outer petals just opening -->
  <g transform="translate(100, 115)">
    <ellipse cx="0" cy="-24" rx="13" ry="19" fill="#e83535" transform="rotate(0)"/>
    <ellipse cx="0" cy="-24" rx="13" ry="19" fill="#e83535" transform="rotate(120)"/>
    <ellipse cx="0" cy="-24" rx="13" ry="19" fill="#e83535" transform="rotate(240)"/>
    <!-- Mid petals -->
    <ellipse cx="0" cy="-16" rx="10" ry="13" fill="#c82020" transform="rotate(60)"/>
    <ellipse cx="0" cy="-16" rx="10" ry="13" fill="#c82020" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="10" ry="13" fill="#c82020" transform="rotate(300)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="12" fill="#9e1212"/>
    <circle cx="-2" cy="-2" r="7" fill="#b01a1a"/>
  </g>
</svg>
