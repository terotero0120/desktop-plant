<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stem -->
  <rect x="94" y="145" width="12" height="115" rx="6" fill="#5a9a3a"/>
  <!-- Thorns -->
  <path d="M94 222 L80 214 L94 218 Z" fill="#4d8f2e"/>
  <path d="M106 244 L120 236 L106 240 Z" fill="#4d8f2e"/>
