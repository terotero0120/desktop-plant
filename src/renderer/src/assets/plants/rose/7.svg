  <!-- Right leaf -->
  <path d="M106 202 Q144 184 150 164 Q128 173 106 190 Z" fill="#4d8f2e"/>
  <line x1="106" y1="202" x2="143" y2="173" stroke="#3d7a1e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 5 outer petals (half bloom) -->
  <g transform="translate(100, 105)">
    <ellipse cx="0" cy="-27" rx="14" ry="20" fill="#e83535" transform="rotate(0)"/>
    <ellipse cx="0" cy="-27" rx="14" ry="20" fill="#e83535" transform="rotate(72)"/>
    <ellipse cx="0" cy="-27" rx="14" ry="20" fill="#e83535" transform="rotate(144)"/>
    <ellipse cx="0" cy="-27" rx="14" ry="20" fill="#e83535" transform="rotate(216)"/>
    <ellipse cx="0" cy="-27" rx="14" ry="20" fill="#e83535" transform="rotate(288)"/>
    <!-- Mid petals -->
    <ellipse cx="0" cy="-18" rx="11" ry="14" fill="#c82020" transform="rotate(36)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="14" fill="#c82020" transform="rotate(108)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="14" fill="#c82020" transform="rotate(180)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="14" fill="#c82020" transform="rotate(252)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="14" fill="#c82020" transform="rotate(324)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="13" fill="#9e1212"/>
    <circle cx="-2" cy="-2" r="8" fill="#b01a1a"/>
  </g>
</svg>
