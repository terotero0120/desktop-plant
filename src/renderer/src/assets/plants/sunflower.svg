<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Stem -->
  <rect x="94" y="115" width="12" height="165" rx="6" fill="#5a9a3a"/>

  <!-- Left leaf -->
  <path d="M94 190 Q58 172 52 150 Q72 158 94 176 Z" fill="#4d8f2e"/>
  <line x1="94" y1="190" x2="58" y2="162" stroke="#3d7a1e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right leaf -->
  <path d="M106 218 Q144 200 150 178 Q130 187 106 204 Z" fill="#4d8f2e"/>
  <line x1="106" y1="218" x2="143" y2="186" stroke="#3d7a1e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Petals (16, alternating shade) -->
  <g transform="translate(100, 95)">
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(0)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(22.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(45)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(67.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(90)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(135)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(180)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(225)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(270)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffd600" transform="rotate(315)"/>
    <ellipse cx="0" cy="-46" rx="9" ry="21" fill="#ffc200" transform="rotate(337.5)"/>

    <!-- Center disk (dark brown) -->
    <circle cx="0" cy="0" r="27" fill="#3b1a05"/>

    <!-- Seed dot pattern (outer ring) -->
    <circle cx="-13" cy="-8"  r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="-5"  cy="-15" r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="5"   cy="-15" r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="13"  cy="-8"  r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="15"  cy="3"   r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="9"   cy="13"  r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="-1"  cy="17"  r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="-11" cy="13"  r="3.5" fill="#5e2e0a" opacity="0.85"/>
    <circle cx="-16" cy="3"   r="3.5" fill="#5e2e0a" opacity="0.85"/>

    <!-- Seed dot pattern (inner ring) -->
    <circle cx="-6"  cy="-6"  r="2.8" fill="#7a4018" opacity="0.9"/>
    <circle cx="3"   cy="-8"  r="2.8" fill="#7a4018" opacity="0.9"/>
    <circle cx="8"   cy="2"   r="2.8" fill="#7a4018" opacity="0.9"/>
    <circle cx="2"   cy="9"   r="2.8" fill="#7a4018" opacity="0.9"/>
    <circle cx="-7"  cy="7"   r="2.8" fill="#7a4018" opacity="0.9"/>

    <!-- Subtle highlight -->
    <circle cx="-5" cy="-5" r="13" fill="#ffffff" opacity="0.06"/>
  </g>
</svg>
