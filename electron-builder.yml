appId: com.typebloom.app
productName: Typebloom
directories:
  buildResources: build
# out/（ビルド成果物）と resources/（トレイアイコン等）のみを同梱する。
# 本番依存の node_modules（uiohook-napi 等）は electron-builder が自動的に含める。
# 注意: package.json に "build" フィールドを置くと electron-builder はこの YML を
# 無視して package.json 側を優先するため、ビルド設定はこのファイルに一本化する。
files:
  - out/**/*
  - resources/**/*
asarUnpack:
  - resources/**
win:
  executableName: typebloom
  target:
    - target: zip
      arch:
        - arm64
# nsis は Windows 上でのみビルド可能（Wine 不要な zip を ARM64 動作確認に使用）
# ARM64 確認後に x64 を追加し、正式リリース時は nsis に切り替える
mac:
  identity: '-'
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # LSUIElement は設定しない: 起動時アクセサリ化すると植物ウィンドウが常に最前面に浮き、
  # デスクトップ専用表示（PR #31）が壊れるため。Dock 非表示は main の app.dock.hide() で行う。
  # （カメラ/マイク/Documents/Downloads の usage description はこのアプリでは未使用のため付けない。
  #   extendInfo を追加する場合はリスト形式 "- key: value" ではなくマップ形式で書くこと。）
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
